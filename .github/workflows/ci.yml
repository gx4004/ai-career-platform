name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, deploy]

# Cancel any in-flight runs for the same ref so a fast follow-up push doesn't
# queue behind a now-stale older one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck / test / build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  backend:
    name: Backend (ruff / pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cw
          POSTGRES_PASSWORD: cw
          POSTGRES_DB: cw_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cw"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff check
        run: ruff check app

      - name: Alembic upgrade smoke
        env:
          DATABASE_URL: postgresql+psycopg2://cw:cw@localhost:5432/cw_ci
        run: alembic upgrade head

      - name: Pytest
        run: pytest -q
